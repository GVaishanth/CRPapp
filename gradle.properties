# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable AndroidX support (required for Material 3 and AndroidX Core/DataStore)
android.useAndroidX=true

# Enable non-transitive R classes for faster builds and clean namespacing
android.nonTransitiveRClass=true

# Suppress compileSdk 36 warning for AGP 8.7.2
android.suppressUnsupportedCompileSdk=36
